<!-- Quill 富文本编辑器组件 -->
<div id="quill-editor-container">
  <div id="quill-toolbar">
    <button class="ql-bold">B</button>
    <button class="ql-italic">I</button>
    <button class="ql-underline">U</button>
    <button class="ql-strike">S</button>
    <select class="ql-color">
      <option value="red">红</option>
      <option value="blue">蓝</option>
      <option value="green">绿</option>
      <option value="black">黑</option>
    </select>
    <select class="ql-background">
      <option value="yellow">黄底</option>
      <option value="lightblue">蓝底</option>
      <option value="lightgreen">绿底</option>
      <option value="white">白底</option>
    </select>
    <button class="ql-clean">清除格式</button>
  </div>
  <div id="quill-editor" style="height: 200px; background: white; color: black;"></div>
</div>

<!-- 引入 Quill 样式和脚本 -->
<link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
<script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
<script>
  // 初始化 Quill
  var quill = new Quill('#quill-editor', {
    modules: {
      toolbar: '#quill-toolbar'
    },
    theme: 'snow',
    placeholder: '在此输入笔记...'
  });

  // 从 parent 获取初始内容（通过 postMessage）
  window.addEventListener('message', function(event) {
    if (event.data.type === 'setContent') {
      quill.root.innerHTML = event.data.content;
    }
  });

  // 当内容变化时通知 parent
  quill.on('text-change', function() {
    var content = quill.root.innerHTML;
    // 通过 postMessage 向 Streamlit 组件发送数据
    // 需要将数据传递给 Streamlit 组件的 on_change 回调
    // 这里使用 window.parent.postMessage 或自定义事件
    // 实际使用时，在 Streamlit 的 components.html 中通过
    // <script> 内的 Streamlit.setComponentValue(content) 来传递
  });
</script>
